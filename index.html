<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sajjad Ali Alhidary | Full Stack Developer</title>
  <meta name="description" content="Portfolio website of Sajjad Ali Alhidary, Full Stack Developer specialized in Laravel-based web applications." />
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#475569;
      --line:#e2e8f0;
      --primary:#0f172a;
      --accent:#2563eb;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.7;
    }
    .container{
      width:min(1100px, 92%);
      margin:auto;
    }
    .nav{
      position:sticky;
      top:0;
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      z-index:20;
    }
    .nav-inner{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 0;
      gap:20px;
    }
    .brand h1{
      font-size:22px;
      margin:0;
    }
    .brand p{
      margin:2px 0 0;
      color:var(--muted);
      font-size:14px;
    }
    .menu{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }
    .menu a{
      color:var(--muted);
      text-decoration:none;
      font-weight:600;
      font-size:14px;
    }
    .menu a:hover{color:var(--text)}
    .hero{
      padding:72px 0 36px;
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:28px;
      align-items:center;
    }
    .badge{
      display:inline-block;
      background:#eff6ff;
      color:#1d4ed8;
      border:1px solid #bfdbfe;
      padding:8px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }
    .hero h2{
      margin:18px 0 14px;
      font-size:46px;
      line-height:1.15;
    }
    .hero p{
      color:var(--muted);
      font-size:18px;
      margin:0;
      max-width:700px;
    }
    .actions{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:26px;
    }
    .btn{
      display:inline-block;
      padding:14px 20px;
      border-radius:16px;
      text-decoration:none;
      font-weight:700;
      border:1px solid var(--line);
      transition:.2s ease;
    }
    .btn-primary{
      background:var(--primary);
      color:white;
      border-color:var(--primary);
    }
    .btn-primary:hover{opacity:.92}
    .btn-secondary{
      background:white;
      color:var(--text);
    }
    .btn-secondary:hover{
      background:#f1f5f9;
    }
    .hero-card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:26px;
      padding:26px;
      box-shadow:0 10px 30px rgba(15,23,42,.06);
    }
    .info-box{
      background:#f8fafc;
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      margin-bottom:14px;
    }
    .info-box:last-child{margin-bottom:0}
    .info-box .label{
      color:var(--muted);
      font-size:13px;
      margin:0 0 4px;
    }
    .
